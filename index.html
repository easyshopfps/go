<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ລະບົບສຸລິຍະ - ຄວບຄຸມດ້ວຍມື</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Segoe UI',Tahoma,sans-serif;color:#fff;}
  #canvas3d{position:fixed;top:0;left:0;width:100%;height:100%;display:block;}
  #video{position:fixed;bottom:16px;right:16px;width:180px;height:135px;border-radius:12px;
    border:2px solid rgba(120,180,255,.5);opacity:.85;transform:scaleX(-1);z-index:5;
    box-shadow:0 0 20px rgba(80,140,255,.4);}
  #overlay{position:fixed;bottom:16px;right:16px;width:180px;height:135px;transform:scaleX(-1);z-index:6;pointer-events:none;}
  #gesture{position:fixed;bottom:167px;right:16px;width:180px;z-index:6;background:rgba(10,15,30,.6);
    padding:8px 10px;border-radius:12px;border:1px solid rgba(120,170,255,.35);
    font-size:14px;text-align:center;backdrop-filter:blur(6px);}
  #status{color:#7ee787;font-weight:600;}
  #startBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;
    padding:16px 34px;font-size:16px;border-radius:40px;border:1px solid rgba(140,190,255,.5);
    background:linear-gradient(135deg,#1c2a4a,#0e1730);color:#dce8ff;cursor:pointer;
    box-shadow:0 0 30px rgba(80,140,255,.35);letter-spacing:.5px;}
  #startBtn:hover{background:linear-gradient(135deg,#26365e,#152040);}
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="gesture">ມື: <span id="status">ບໍ່ພົບມື</span></div>
<button id="startBtn">ເປີດກ້ອງ &amp; ເລີ່ມຕົ້ນ</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ============================= THREE.JS SCENE ============================= */
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 5000);
let cameraDefaultDist = 220, cameraDist = 220;
camera.position.set(0, 90, cameraDist);
camera.lookAt(0,0,0);

function makeStars(count, spread, size){
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = spread*(0.5+Math.random()*0.5);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    pos[i*3] = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2] = r*Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({color:0xffffff, size:size, transparent:true, opacity:0.85, depthWrite:false});
  return new THREE.Points(geo, mat);
}
const stars = makeStars(6000, 2200, 1.1);
scene.add(stars);
const starsClose = makeStars(1500, 900, 1.7);
scene.add(starsClose);

scene.add(new THREE.AmbientLight(0x334466, 0.4));
const sunLight = new THREE.PointLight(0xfff2cc, 3.2, 3000, 1.6);
scene.add(sunLight);

const sunBaseRadius = 14;
const sun = new THREE.Mesh(new THREE.SphereGeometry(sunBaseRadius, 48, 48), new THREE.MeshBasicMaterial({color:0xffcc55}));
scene.add(sun);
const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(sunBaseRadius*1.35, 48, 48), new THREE.MeshBasicMaterial({color:0xffaa33, transparent:true, opacity:0.35}));
scene.add(sunGlow);

function makeOrbitLine(radius){
  const pts = [];
  for(let i=0;i<=128;i++){
    const a = (i/128)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*radius, 0, Math.sin(a)*radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0x557799, transparent:true, opacity:0.35});
  return new THREE.Line(geo, mat);
}

const planetDefs = [
  {name:'Mercury', r:1.6, orbit:26,  speed:1.60, color:0xa79a8c},
  {name:'Venus',   r:2.8, orbit:37,  speed:1.18, color:0xe0b98d},
  {name:'Earth',   r:3.0, orbit:50,  speed:1.00, color:0x4d90fe, moon:true},
  {name:'Mars',    r:2.2, orbit:64,  speed:0.80, color:0xc1440e},
  {name:'Jupiter', r:8.5, orbit:92,  speed:0.44, color:0xd8ae7e},
  {name:'Saturn',  r:7.2, orbit:122, speed:0.33, color:0xe3cf9c, ring:true},
  {name:'Uranus',  r:5.0, orbit:150, speed:0.24, color:0x9fdde0},
  {name:'Neptune', r:4.8, orbit:175, speed:0.19, color:0x4166f5},
];

const planets = [];
planetDefs.forEach((def, idx)=>{
  scene.add(makeOrbitLine(def.orbit));
  const geo = new THREE.SphereGeometry(def.r, 32, 32);
  const mat = new THREE.MeshStandardMaterial({color:def.color, roughness:0.8, metalness:0.1});
  const mesh = new THREE.Mesh(geo, mat);
  const angle = Math.random()*Math.PI*2;
  mesh.userData = {def, angle, heartIndex: idx, burstMul: 1};
  scene.add(mesh);
  if(def.ring){
    const ringGeo = new THREE.RingGeometry(def.r*1.4, def.r*2.3, 64);
    const ringMat = new THREE.MeshBasicMaterial({color:0xcbb98a, side:THREE.DoubleSide, transparent:true, opacity:0.7});
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2 - 0.4;
    mesh.add(ring);
  }
  if(def.moon){
    const moonGeo = new THREE.SphereGeometry(0.8, 16, 16);
    const moonMat = new THREE.MeshStandardMaterial({color:0xaaaaaa});
    const moon = new THREE.Mesh(moonGeo, moonMat);
    moon.userData.moonAngle = 0;
    moon.userData.moonDist = def.r*3;
    mesh.add(moon);
    mesh.userData.moon = moon;
  }
  planets.push(mesh);
});

/* ============================= BLACK HOLE ============================= */
const blackHolePos = new THREE.Vector3(120, 35, 55);
const blackHoleGroup = new THREE.Group();
blackHoleGroup.position.copy(blackHolePos);
scene.add(blackHoleGroup);

const bhCore = new THREE.Mesh(new THREE.SphereGeometry(6, 32, 32), new THREE.MeshBasicMaterial({color:0x000000}));
blackHoleGroup.add(bhCore);

const bhRings = [];
for(let i=0;i<3;i++){
  const ringGeo = new THREE.RingGeometry(7+i*3.2, 9+i*3.2, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: i===0 ? 0xff8844 : (i===1 ? 0xaa55ff : 0x55ccff),
    side:THREE.DoubleSide, transparent:true, opacity:0.0, blending:THREE.AdditiveBlending
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2 + i*0.25;
  blackHoleGroup.add(ring);
  bhRings.push(ring);
}
blackHoleGroup.scale.setScalar(0.001);

/* ============================= "I LOVE YOU" TEXT PARTICLES ============================= */
function generateTextPoints(text){
  const cnv = document.createElement('canvas');
  cnv.width = 1600; cnv.height = 320;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,cnv.width,cnv.height);
  ctx.fillStyle = '#fff';
  ctx.font = '900 140px "Arial Black", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const textWidthPx = Math.max(ctx.measureText(text).width, 10);
  ctx.fillText(text, cnv.width/2, cnv.height/2);
  const data = ctx.getImageData(0,0,cnv.width,cnv.height).data;
  const pts = [];
  const step = 1;
  const desiredWorldWidth = 200; // total width the word should occupy in the scene
  const scale = desiredWorldWidth / textWidthPx; // uniform -> letters stay undistorted
  for(let y=0;y<cnv.height;y+=step){
    for(let x=0;x<cnv.width;x+=step){
      const idx = (y*cnv.width+x)*4;
      if(data[idx] > 128){
        const nx = (x - cnv.width/2) * scale;
        const ny = -(y - cnv.height/2) * scale;
        pts.push(new THREE.Vector3(nx, ny, 0));
      }
    }
  }
  return pts;
}
const textShapePoints = generateTextPoints('I LOVE YOU');

const LOVE_COUNT = Math.min(2200, Math.max(600, textShapePoints.length));
const loveBase = new Float32Array(LOVE_COUNT*3);
const loveTarget = new Float32Array(LOVE_COUNT*3);
for(let i=0;i<LOVE_COUNT;i++){
  // base: particles start scattered deep inside/behind the sun, invisible until summoned
  const r = 6+Math.random()*8;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  loveBase[i*3] = r*Math.sin(phi)*Math.cos(theta);
  loveBase[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
  loveBase[i*3+2] = r*Math.cos(phi);

  const tp = textShapePoints.length>0 ? textShapePoints[i % textShapePoints.length] : new THREE.Vector3(0,0,0);
  loveTarget[i*3] = tp.x + (Math.random()-0.5)*0.6;
  loveTarget[i*3+1] = 60 + tp.y + (Math.random()-0.5)*0.6;
  loveTarget[i*3+2] = tp.z + (Math.random()-0.5)*2.5;
}
const loveGeo = new THREE.BufferGeometry();
const lovePosAttr = new THREE.BufferAttribute(new Float32Array(LOVE_COUNT*3), 3);
loveGeo.setAttribute('position', lovePosAttr);
const loveMat = new THREE.PointsMaterial({size:2.0, color:0xff4d88, transparent:true, opacity:0.0, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true});
const loveParticles = new THREE.Points(loveGeo, loveMat);
scene.add(loveParticles);

/* ============================= INTERACTION STATE ============================= */
let suckT = 0, loveT = 0, captureT = 0;
let flingAnim = 0, flingActive = false, swirlSpeed = 0;

let handSizeSmoothed = null, lastHandSize = null, lastHandTime = performance.now();
let zoomTargetDist = cameraDefaultDist;

let handHistory = [];
let prevGesture = 'none';
let burstActive = false, burstStart = 0;
const burstDir = new THREE.Vector3();

const statusEl = document.getElementById('status');
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  const sunScale = 1 + suckT*2.6;
  sun.scale.setScalar(sunScale);
  sunGlow.scale.setScalar(sunScale*1.05 + Math.sin(t*3)*0.02);
  sunLight.intensity = 3.2 + suckT*4.5;

  const bhVisTarget = captureT > 0.02 ? 1 : 0;
  blackHoleGroup.userData.vis = blackHoleGroup.userData.vis || 0;
  blackHoleGroup.userData.vis += (bhVisTarget - blackHoleGroup.userData.vis) * Math.min(dt*3,1);
  const bhVis = blackHoleGroup.userData.vis;
  blackHoleGroup.scale.setScalar(0.001 + bhVis*(1+captureT*0.6));
  bhRings.forEach((ring,i)=>{
    ring.material.opacity = bhVis*0.75;
    ring.rotation.z += dt*(1.5+i*0.8)*(0.4+captureT*1.6);
  });
  blackHoleGroup.rotation.y += dt*0.3;

  let burstFactor = 0;
  if(burstActive){
    const bt = (performance.now()-burstStart)/800;
    if(bt>=1){ burstActive=false; } else { burstFactor = Math.pow(1-bt,2); }
  }

  planets.forEach((mesh)=>{
    const def = mesh.userData.def;
    mesh.userData.angle += def.speed*0.28*dt*(1-suckT*0.6) + swirlSpeed*dt;

    const orbitPos = new THREE.Vector3(
      Math.cos(mesh.userData.angle)*def.orbit,
      0,
      Math.sin(mesh.userData.angle)*def.orbit
    );

    let pos = orbitPos.clone();
    if(suckT>0.001) pos.lerp(new THREE.Vector3(0,0,0), suckT);
    if(captureT>0.001) pos.lerp(blackHolePos, captureT);
    if(burstFactor>0.001) pos.addScaledVector(burstDir, burstFactor*70*mesh.userData.burstMul);
    mesh.position.copy(pos);

    const scale = Math.max(1 - suckT*0.85 - captureT*0.9, 0.02);
    mesh.scale.setScalar(scale);
    mesh.rotation.y += dt*0.6;

    if(mesh.userData.moon){
      mesh.userData.moon.userData.moonAngle += dt*2.2;
      const ma = mesh.userData.moon.userData.moonAngle;
      mesh.userData.moon.position.set(Math.cos(ma)*mesh.userData.moon.userData.moonDist,0,Math.sin(ma)*mesh.userData.moon.userData.moonDist);
    }
  });

  const posArr = lovePosAttr.array;
  const wobble = Math.sin(t*1.3)*0.4;
  const loveEaseMove = loveT*loveT*(3-2*loveT);
  for(let i=0;i<LOVE_COUNT;i++){
    const bx=loveBase[i*3], by=loveBase[i*3+1], bz=loveBase[i*3+2];
    const tx=loveTarget[i*3], ty=loveTarget[i*3+1]+wobble, tz=loveTarget[i*3+2];
    posArr[i*3]   = bx + (tx-bx)*loveEaseMove;
    posArr[i*3+1] = by + (ty-by)*loveEaseMove;
    posArr[i*3+2] = bz + (tz-bz)*loveEaseMove;
  }
  lovePosAttr.needsUpdate = true;
  loveMat.opacity = loveEaseMove*0.95;
  loveMat.size = 1.6 + loveEaseMove*1.4;

  if(flingActive){
    flingAnim += dt*1.6;
    const burst = Math.sin(Math.min(flingAnim,1)*Math.PI);
    cameraDist = cameraDefaultDist + burst*260;
    swirlSpeed = burst*3.5;
    if(flingAnim >= 1){
      flingActive = false; flingAnim = 0; swirlSpeed = 0;
      zoomTargetDist = cameraDefaultDist;
    }
  } else {
    cameraDist += (zoomTargetDist - cameraDist)*Math.min(dt*4,1);
    swirlSpeed += (0-swirlSpeed)*Math.min(dt*3,1);
  }

  const camAngle = t*0.02;
  const camY = 90*(cameraDist/cameraDefaultDist);
  camera.position.set(Math.sin(camAngle)*cameraDist, camY, Math.cos(camAngle)*cameraDist);
  camera.lookAt(0,0,0);

  stars.rotation.y += dt*0.005;
  starsClose.rotation.y -= dt*0.008;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================= HAND TRACKING ============================= */
const videoEl = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y, (a.z||0)-(b.z||0)); }

function isExtended(landmarks, tipIdx, pipIdx, mcpIdx){
  const wrist = landmarks[0];
  const tip = landmarks[tipIdx], pip = landmarks[pipIdx], mcp = landmarks[mcpIdx];
  return dist(tip,wrist) > dist(pip,wrist)*1.05 && dist(tip,wrist) > dist(mcp,wrist)*1.1;
}

function classifyGesture(landmarks){
  const indexExt = isExtended(landmarks, 8, 6, 5);
  const middleExt = isExtended(landmarks, 12, 10, 9);
  const ringExt = isExtended(landmarks, 16, 14, 13);
  const pinkyExt = isExtended(landmarks, 20, 18, 17);
  const extCount = [indexExt,middleExt,ringExt,pinkyExt].filter(Boolean).length;

  if(!indexExt && !middleExt && !ringExt && !pinkyExt) return 'fist';
  if(indexExt && pinkyExt && !middleExt && !ringExt) return 'ily';
  if(indexExt && middleExt && !ringExt && !pinkyExt) return 'peace';
  if(indexExt && !middleExt && !ringExt && !pinkyExt) return 'one';
  if(extCount >= 3) return 'open';
  return 'none';
}

function handBoundingSize(landmarks){
  let minX=1,maxX=0,minY=1,maxY=0;
  landmarks.forEach(p=>{
    if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x;
    if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
  });
  return Math.hypot(maxX-minX, maxY-minY);
}

function triggerBurst(){
  let dx=0, dy=0;
  if(handHistory.length>=2){
    const first = handHistory[0], last = handHistory[handHistory.length-1];
    dx = last.x-first.x; dy = last.y-first.y;
  }
  let mag = Math.hypot(dx,dy);
  let dirX, dirY;
  if(mag < 0.015){
    const a = Math.random()*Math.PI*2;
    dirX = Math.cos(a); dirY = Math.sin(a);
  } else {
    dirX = dx/mag; dirY = dy/mag;
  }
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
  const up = new THREE.Vector3().crossVectors(right, forward).normalize();
  burstDir.copy(right.clone().multiplyScalar(dirX).add(up.clone().multiplyScalar(-dirY))).normalize();
  planets.forEach(p=>{ p.userData.burstMul = 0.6+Math.random()*1.0; });
  burstActive = true;
  burstStart = performance.now();
}

function onResults(results){
  octx.save();
  octx.clearRect(0,0,overlay.width, overlay.height);

  if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
    const landmarks = results.multiHandLandmarks[0];

    octx.fillStyle = 'rgba(140,200,255,0.9)';
    landmarks.forEach(p=>{
      octx.beginPath();
      octx.arc(p.x*overlay.width, p.y*overlay.height, 3, 0, Math.PI*2);
      octx.fill();
    });

    const gesture = classifyGesture(landmarks);
    const gestureLabel = {
      fist:'ກຳມື', ily:'ຮັກ (I Love You)', peace:'ດູດເຂົ້າຫຼຸມດຳ',
      one:'ປ່ອຍອອກຈາກຫຼຸມດຳ', open:'ແບມື', none:'ກຳລັງກວດຈັບ...'
    };
    statusEl.textContent = gestureLabel[gesture] || 'ພົບມື';

    const cx = (landmarks[0].x + landmarks[9].x)/2;
    const cy = (landmarks[0].y + landmarks[9].y)/2;
    const now = performance.now();

    handHistory.push({x:cx, y:cy, t:now});
    while(handHistory.length && now - handHistory[0].t > 350) handHistory.shift();

    if(prevGesture === 'fist' && gesture !== 'fist'){
      triggerBurst();
    }
    prevGesture = gesture;

    const suckTarget = gesture === 'fist' ? 1 : 0;
    suckT += (suckTarget - suckT) * Math.min(0.06 + Math.abs(suckTarget-suckT)*0.06, 0.2);

    const loveTarget = gesture === 'ily' ? 1 : 0;
    loveT += (loveTarget - loveT) * Math.min(0.05 + Math.abs(loveTarget-loveT)*0.05, 0.15);

    if(gesture === 'peace'){
      captureT += (1 - captureT) * 0.06;
    } else {
      captureT += (0 - captureT) * 0.05;
    }

    const size = handBoundingSize(landmarks);
    if(handSizeSmoothed === null) handSizeSmoothed = size;
    handSizeSmoothed += (size - handSizeSmoothed)*0.35;

    if(lastHandSize !== null){
      const deltaT = Math.max((now-lastHandTime)/1000, 0.001);
      const rate = (handSizeSmoothed - lastHandSize)/deltaT;
      if(rate < -1.1 && !flingActive){
        flingActive = true; flingAnim = 0;
      }
      if(!flingActive){
        const clamped = Math.max(0.12, Math.min(0.6, handSizeSmoothed));
        const norm = (clamped - 0.12)/(0.6-0.12);
        zoomTargetDist = cameraDefaultDist - norm*140;
      }
    }
    lastHandSize = handSizeSmoothed;
    lastHandTime = now;

  } else {
    statusEl.textContent = 'ບໍ່ພົບມື';
    suckT += (0 - suckT)*0.08;
    loveT += (0 - loveT)*0.06;
    captureT += (0 - captureT)*0.05;
    lastHandSize = null;
    handSizeSmoothed = null;
    handHistory = [];
    prevGesture = 'none';
  }
  octx.restore();
}

const hands = new Hands({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6});
hands.onResults(onResults);

document.getElementById('startBtn').addEventListener('click', async ()=>{
  document.getElementById('startBtn').style.display = 'none';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{width:320,height:240}});
    videoEl.srcObject = stream;
    await videoEl.play();
    overlay.width = 180; overlay.height = 135;

    const camUtil = new Camera(videoEl, {
      onFrame: async ()=>{ await hands.send({image:videoEl}); },
      width:320, height:240
    });
    camUtil.start();
  }catch(err){
    statusEl.textContent = 'ເປີດກ້ອງບໍ່ໄດ້';
    console.error(err);
  }
});
</script>
</body>
</html>
